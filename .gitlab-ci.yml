# Pipeline GitLab CI/CD pour compilation Nuitka ARM64 (Jetson Orin NX)
# Compatible avec GitLab auto-heberge

stages:
  - build
  - package
  - release

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  ARTIFACT_NAME: "4isafecross-arm64-jetson"

# Job de compilation ARM64 avec emulation QEMU
build:arm64:
  stage: build
  image: docker:25-cli
  timeout: 3h
  services:
    - docker:25-dind
  before_script:
    - docker info
    - docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
    - echo "QEMU ARM64 configure"
  script:
    - echo "Debut de la compilation Nuitka ARM64"
    - echo "Repertoire de travail':' ${CI_PROJECT_DIR}"
    - ls -la
    - echo "Verification de pyproject.toml:"
    - test -f pyproject.toml && echo "pyproject.toml present" || echo "pyproject.toml absent"
    - CONTAINER_ID=$(docker create --platform linux/arm64 -w /workspace arm64v8/ubuntu:22.04 sleep 3600)
    - echo "Container ID':' ${CONTAINER_ID}"
    - docker cp "${CI_PROJECT_DIR}/." ${CONTAINER_ID}:/workspace/
    - docker start ${CONTAINER_ID}
    - docker exec ${CONTAINER_ID} bash -c 'pwd && ls -la && test -f pyproject.toml && echo "pyproject.toml OK" || exit 1'
    - docker exec ${CONTAINER_ID} bash -c 'apt-get update -qq && apt-get install -y -qq python3.10 python3.10-dev python3.10-venv python3-pip build-essential gcc g++ ccache patchelf pkg-config ninja-build meson libglib2.0-0 libglib2.0-dev libcairo2-dev libgirepository1.0-dev gobject-introspection libffi-dev libsm6 libxrender1 libxext6 libgl1-mesa-glx curl git'
    - docker exec ${CONTAINER_ID} bash -c 'curl -LsSf https://astral.sh/uv/install.sh | sh && export PATH="/root/.local/bin:$PATH" && uv --version'
    - docker exec ${CONTAINER_ID} bash -c 'export PATH="/root/.local/bin:$PATH" && uv sync'
    - docker exec ${CONTAINER_ID} bash -c 'export PATH="/root/.local/bin:$PATH" && uv run nuitka --standalone --assume-yes-for-downloads --jobs=4 --include-data-dir=config=config --include-data-dir=templates=templates --include-data-dir=static=static --include-data-dir=db=db --include-data-file=.venv/lib/python3.10/site-packages/yoctopuce/cdll/libyapi-aarch64.so=yoctopuce/cdll/libyapi-aarch64.so --output-dir=dist --output-filename=4isafecross app.py'
    - docker exec ${CONTAINER_ID} bash -c 'ls -lh dist/ && if [ -f dist/4isafecross ]; then file dist/4isafecross; elif [ -d dist/app.dist ]; then file dist/app.dist/app; fi'
    - docker cp ${CONTAINER_ID}:/workspace/dist ./dist
    - docker stop ${CONTAINER_ID}
    - docker rm ${CONTAINER_ID}
    - ls -lh dist/
  artifacts:
    name: "${ARTIFACT_NAME}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - dist/
    expire_in: 30 days
  only:
    - main
    - jetson_gpu
    - tags
  except:
    - schedules

# Job de packaging (creation de l'archive)
package:arm64:
  stage: package
  image: alpine:latest
  dependencies:
    - build:arm64
  before_script:
    - apk add --no-cache tar gzip file
  script:
    - echo "Creation de l'archive de deploiement..."
    - cd dist
    - |
      if [ -d "app.dist" ]; then
        tar -czf ${ARTIFACT_NAME}.tar.gz app.dist/
        echo "Archive creee: ${ARTIFACT_NAME}.tar.gz (dossier)"
      elif [ -f "4isafecross" ]; then
        tar -czf ${ARTIFACT_NAME}.tar.gz 4isafecross
        echo "Archive creee: ${ARTIFACT_NAME}.tar.gz (fichier unique)"
      else
        echo "Aucun executable trouve!"
        exit 1
      fi
    - cd ..
    - ls -lh dist/*.tar.gz
    - echo "Taille de l'archive:"
    - du -h dist/*.tar.gz
  artifacts:
    name: "${ARTIFACT_NAME}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - dist/*.tar.gz
    expire_in: 30 days
  only:
    - main
    - jetson_gpu
    - tags

# Job de release (uniquement pour les tags)
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  dependencies:
    - package:arm64
  script:
    - echo "Creation de la release ${CI_COMMIT_TAG}"
  release:
    tag_name: '$CI_COMMIT_TAG'
    name: 'Release $CI_COMMIT_TAG'
    description: |
      ## Release automatique $CI_COMMIT_TAG
      
      ### Executable ARM64 pour Nvidia Jetson Orin NX
      
      **Compilation:**
      - Architecture: ARM64 (aarch64)
      - Python: 3.10
      - JetPack: 6.1 compatible
      
      **Telechargement:**
      Telechargez l'archive depuis les artifacts du job package:arm64 de cette pipeline.
      
      **Deploiement:**
      Voir CHANGELOG pour plus de details.
  only:
    - tags
  except:
    - branches

# Job optionnel: test local (manuel)
test:local:
  stage: build
  image: docker:25-cli
  services:
    - docker:25-dind
  script:
    - echo "Test de compilation local (job manuel)"
    - docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
    - bash scripts/test-build-local.sh || true
  when: manual
  allow_failure: true
