# Pipeline GitLab CI/CD pour compilation Nuitka ARM64 (Jetson Orin NX)
# Compatible avec GitLab auto-hébergé

stages:
  - build
  - package
  - release

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  ARTIFACT_NAME: "4isafecross-arm64-jetson"

# Job de compilation ARM64 avec émulation QEMU
build:arm64:
  stage: build
  image: docker:25-cli
  services:
    - docker:25-dind
  # tags:
  #   - docker  # Commenté pour utiliser n'importe quel runner disponible
  before_script:
    - docker info
    # Installer QEMU pour émulation ARM64
    - docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
    - echo "✅ QEMU ARM64 configuré"
  script:
    - echo "🚀 Début de la compilation Nuitka ARM64"
    - echo "📂 Répertoire de travail: $(pwd)"
    - ls -la
    - |
      docker run --rm \
        --platform linux/arm64 \
        -v "${CI_PROJECT_DIR}":/workspace \
        -w /workspace \
        arm64v8/ubuntu:22.04 \
        bash -c '
          set -ex
          
          echo "📦 Installation des dépendances système..."
          apt-get update -qq
          apt-get install -y -qq \
            python3.10 \
            python3.10-dev \
            python3.10-venv \
            python3-pip \
            build-essential \
            gcc \
            g++ \
            ccache \
            patchelf \
            pkg-config \
            ninja-build \
            meson \
            libglib2.0-0 \
            libglib2.0-dev \
            libcairo2-dev \
            libgirepository1.0-dev \
            gobject-introspection \
            libffi-dev \
            libsm6 \
            libxrender1 \
            libxext6 \
            libgl1-mesa-glx \
            curl \
            git
          
          echo "🔧 Installation de uv..."
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="/root/.local/bin:$PATH"
          
          echo "📚 Synchronisation des dépendances..."
          uv sync
          
          echo "⚙️  Compilation avec Nuitka..."
          uv run nuitka \
            --standalone \
            --onefile \
            --assume-yes-for-downloads \
            --include-data-dir=config=config \
            --include-data-dir=templates=templates \
            --include-data-dir=static=static \
            --include-data-dir=db=db \
            --include-data-dir=logs=logs \
            --include-data-file=.venv/lib/python3.10/site-packages/yoctopuce/cdll/libyapi-aarch64.so=yoctopuce/cdll/libyapi-aarch64.so \
            --output-dir=dist \
            --output-filename=4isafecross \
            app.py
          
          echo "✅ Compilation terminée !"
          ls -lh dist/
          
          # Vérification
          if [ -f "dist/4isafecross" ]; then
            file dist/4isafecross
          elif [ -d "dist/app.dist" ]; then
            file dist/app.dist/app
          fi
        '
    - echo "📋 Contenu du dossier dist/"
    - ls -lh dist/
  artifacts:
    name: "${ARTIFACT_NAME}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - dist/
    expire_in: 30 days
  only:
    - main
    - jetson_gpu
    - tags
  except:
    - schedules

# Job de packaging (création de l'archive)
package:arm64:
  stage: package
  image: alpine:latest
  # tags:
  #   - docker
  dependencies:
    - build:arm64
  before_script:
    - apk add --no-cache tar gzip file
  script:
    - echo "📦 Création de l'archive de déploiement..."
    - cd dist
    - |
      if [ -d "app.dist" ]; then
        tar -czf ${ARTIFACT_NAME}.tar.gz app.dist/
        echo "✅ Archive créée : ${ARTIFACT_NAME}.tar.gz (dossier)"
      elif [ -f "4isafecross" ]; then
        tar -czf ${ARTIFACT_NAME}.tar.gz 4isafecross
        echo "✅ Archive créée : ${ARTIFACT_NAME}.tar.gz (fichier unique)"
      else
        echo "❌ Aucun exécutable trouvé !"
        exit 1
      fi
    - cd ..
    - ls -lh dist/*.tar.gz
    - echo "📊 Taille de l'archive :"
    - du -h dist/*.tar.gz
  artifacts:
    name: "${ARTIFACT_NAME}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - dist/*.tar.gz
    expire_in: 30 days
  only:
    - main
    - jetson_gpu
    - tags

# Job de release (uniquement pour les tags)
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  # tags:
  #   - docker
  dependencies:
    - package:arm64
  script:
    - echo "🚀 Création de la release ${CI_COMMIT_TAG}"
  release:
    tag_name: '$CI_COMMIT_TAG'
    name: 'Release $CI_COMMIT_TAG'
    description: |
      ## 🎉 Release automatique $CI_COMMIT_TAG
      
      ### 📦 Exécutable ARM64 pour Nvidia Jetson Orin NX
      
      **Compilation :**
      - Architecture : ARM64 (aarch64)
      - Python : 3.10
      - JetPack : 6.1 compatible
      
      **Téléchargement :**
      Téléchargez l'archive depuis les artifacts du job `package:arm64` de cette pipeline.
      
      **Déploiement :**
      ```bash
      # Transférer sur le Jetson
      scp ${ARTIFACT_NAME}.tar.gz user-4itec@<jetson-ip>:/home/user-4itec/
      
      # Sur le Jetson, extraire et lancer
      ssh user-4itec@<jetson-ip>
      tar -xzf ${ARTIFACT_NAME}.tar.gz
      cd app.dist/  # ou utilisez directement ./4isafecross si onefile
      chmod +x app
      ./app
      ```
      
      ### 📝 Changements
      Voir le CHANGELOG pour plus de détails.
  only:
    - tags
  except:
    - branches

# Job optionnel : test local (manuel)
test:local:
  stage: build
  image: docker:25-cli
  services:
    - docker:25-dind
  # tags:
  #   - docker
  script:
    - echo "🧪 Test de compilation local (job manuel)"
    - docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
    - bash scripts/test-build-local.sh || true
  when: manual
  allow_failure: true
