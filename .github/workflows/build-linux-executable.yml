name: Build Linux Executable for Jetson Orin NX

on:
  push:
    branches: [ main, jetson_gpu ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main, jetson_gpu ]
  workflow_dispatch:  # Permet de déclencher manuellement

jobs:
  build-linux-executable-arm64:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU for ARM64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build in ARM64 Docker container with Nuitka
        uses: addnab/docker-run-action@v3
        with:
          image: arm64v8/ubuntu:22.04
          options: --platform=linux/arm64 -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            set -ex
            
            # Installation des dépendances système
            apt-get update
            apt-get install -y \
              python3.10 \
              python3.10-dev \
              python3.10-venv \
              python3-pip \
              build-essential \
              gcc \
              g++ \
              ccache \
              patchelf \
              libglib2.0-0 \
              libsm6 \
              libxrender1 \
              libxext6 \
              libgl1-mesa-glx \
              curl \
              git
            
            # Installation de uv (gestionnaire de dépendances)
            curl -LsSf https://astral.sh/uv/install.sh | sh
            export PATH="/root/.local/bin:$PATH"
            
            # Synchronisation des dépendances avec uv
            uv sync
            
            # Créer les répertoires nécessaires
            mkdir -p config templates static db logs
            
            # Compilation avec Nuitka
            uv run nuitka \
              --standalone \
              --onefile \
              --assume-yes-for-downloads \
              --include-data-dir=config=config \
              --include-data-dir=templates=templates \
              --include-data-dir=static=static \
              --include-data-dir=db=db \
              --include-data-dir=logs=logs \
              --include-data-file=.venv/lib/python3.10/site-packages/yoctopuce/cdll/libyapi-aarch64.so=yoctopuce/cdll/libyapi-aarch64.so \
              --output-dir=dist \
              --output-filename=4isafecross \
              app.py
            
            # Vérification de l'exécutable
            ls -lh dist/
            file dist/4isafecross || file dist/app.dist/app || true
            
            # Créer une archive pour faciliter le déploiement
            cd dist
            if [ -d "app.dist" ]; then
              tar -czf 4isafecross-arm64-jetson.tar.gz app.dist/
            else
              tar -czf 4isafecross-arm64-jetson.tar.gz 4isafecross
            fi
            cd ..

      - name: Upload executable artifact (ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: 4isafecross-linux-arm64-executable
          path: |
            dist/*.tar.gz
            dist/app.dist/
          retention-days: 30

      - name: Create Release (if tag pushed)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# Note: Ce workflow utilise QEMU et un conteneur Docker arm64v8/ubuntu pour générer 
# un exécutable ARM64 compatible Jetson Orin NX avec Nuitka.
# L'option --onefile crée un seul fichier exécutable si possible.
# Si Nuitka crée un dossier app.dist/, celui-ci est archivé automatiquement.
