# Pipeline GitLab CI/CD pour image Docker ARM64 (Jetson Orin NX)
# Code protege par conteneur signe

stages:
  - build
  - release

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  IMAGE_NAME: "${CI_REGISTRY_IMAGE}"
  IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"

# Build image Docker ARM64
build:docker:arm64:
  stage: build
  image: docker:25-cli
  services:
    - docker:25-dind
  before_script:
    - echo "Nettoyage de l'espace disque..."
    - docker system prune -af --volumes || true
    - df -h
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
  script:
    - echo "Construction de l'image Docker ARM64..."
    - |
      docker buildx create --use --name multiarch || docker buildx use multiarch
      docker buildx build \
        --platform linux/arm64 \
        --build-arg PYTHON_VERSION=3.10 \
        --tag ${IMAGE_NAME}:${IMAGE_TAG} \
        --tag ${IMAGE_NAME}:latest \
        --push \
        --progress=plain \
        .
    - echo "Image creee: ${IMAGE_NAME}:${IMAGE_TAG}"
  after_script:
    - docker system prune -f || true
  only:
    - main
    - jetson_gpu
    - tags

# Release avec instructions de deploiement
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  dependencies: []
  script:
    - echo "Creation de la release ${CI_COMMIT_TAG}"
  release:
    tag_name: '$CI_COMMIT_TAG'
    name: 'Release $CI_COMMIT_TAG'
    description: |
      ## Release Docker ARM64 $CI_COMMIT_TAG
      
      ### Image Docker pour Nvidia Jetson Orin NX
      
      **Image:**
      ```
      ${IMAGE_NAME}:${CI_COMMIT_TAG}
      ```
      
      **Deploiement sur Jetson:**
      ```bash
      # Connexion au registry
      docker login gitlab.4itec.ddns.net
      
      # Telecharger l'image
      docker pull ${IMAGE_NAME}:${CI_COMMIT_TAG}
      
      # Lancer le conteneur
      docker run -d \
        --name 4isafecross \
        --runtime nvidia \
        --restart unless-stopped \
        --privileged \
        -p 5000:5000 \
        -v /data/4isafecross:/app/data \
        ${IMAGE_NAME}:${CI_COMMIT_TAG}
      ```
      
      **Verifier les logs:**
      ```bash
      docker logs -f 4isafecross
      ```
  only:
    - tags
  except:
    - branches
